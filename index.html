<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAST | Coming Soon</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <section class="hero">
    <div class="hero-overlay"></div>

    <header class="site-header">
      <div class="brand">CAST</div>
      <nav>
        <a href="#join">Join the List</a>
      </nav>
    </header>

    <main class="hero-content">
      <p class="pre-title">Built by Anglers. Trusted by Everyone.</p>

      <h1>
        SOMETHING<br />
        DIFFERENT<br />
        IS COMING.
      </h1>

      <div class="line"></div>

      <div class="countdown">
        <div><span id="days">00</span><small>Days</small></div>
        <div><span id="hours">00</span><small>Hours</small></div>
        <div><span id="minutes">00</span><small>Minutes</small></div>
        <div><span id="seconds">00</span><small>Seconds</small></div>
      </div>

      <form id="join" class="signup">
        <input type="email" placeholder="Enter your email address" required />
        <button type="submit">Join the List</button>
      </form>

      <p class="hint">Be the first to know when we launch.</p>
    </main>

    <div class="scroll-cue">
      <span>Scroll</span>
      <div>↓</div>
    </div>
  </section>

  <section class="quiet-section">
    <p>Some things are worth waiting for.</p>
  </section>

  <footer>
    <span>© 2026 CAST</span>
    <span>Built in the UK</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAST | Coming Soon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0F1412;
      color: #F7F7F7;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(15,20,18,0.85), rgba(15,20,18,0.95)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
      background-size: cover;
      background-position: center;
      z-index: -1;
    }

    .content {
      max-width: 700px;
      padding: 30px;
      animation: fadeIn 1.8s ease;
    }

    h1 {
      font-size: 72px;
      letter-spacing: 12px;
      margin: 0;
      color: #B8903A;
    }

    h2 {
      font-size: 24px;
      margin: 20px 0 10px;
      font-weight: 400;
    }

    p {
      color: #d6d6d6;
      font-size: 18px;
      line-height: 1.6;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 35px 0;
      flex-wrap: wrap;
    }

    .time-box {
      border: 1px solid rgba(184,144,58,0.5);
      padding: 18px;
      min-width: 90px;
      border-radius: 8px;
      background: rgba(0,0,0,0.25);
    }

    .time-box span {
      display: block;
      font-size: 32px;
      color: #B8903A;
      font-weight: bold;
    }

    .time-box small {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 2px;
    }

    form {
      margin-top: 25px;
    }

    input {
      padding: 15px;
      width: 260px;
      max-width: 80%;
      border: none;
      border-radius: 4px;
      margin-right: 8px;
      font-size: 16px;
    }

    button {
      padding: 15px 22px;
      border: none;
      border-radius: 4px;
      background: #B8903A;
      color: #0F1412;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #d3aa4a;
    }

    .socials {
      margin-top: 35px;
      font-size: 14px;
      color: #aaa;
    }

    .socials span {
      margin: 0 10px;
    }

    footer {
      position: fixed;
      bottom: 18px;
      width: 100%;
      font-size: 13px;
      color: #777;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 52px;
        letter-spacing: 8px;
      }

      h2 {
        font-size: 20px;
      }

      input {
        margin: 0 0 10px;
        width: 100%;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <main class="content">
    <img src="IMG_0316.png" class="main-logo" alt="CAST Logo">
    <h2>Built by Anglers. Trusted by Everyone.</h2>
    <p>A new chapter in carp fishing is about to begin.</p>

    <div class="countdown">
      <div class="time-box">
        <span id="days">00</span>
        <small>DAYS</small>
      </div>
      <div class="time-box">
        <span id="hours">00</span>
        <small>HOURS</small>
      </div>
      <div class="time-box">
        <span id="minutes">00</span>
        <small>MINUTES</small>
      </div>
      <div class="time-box">
        <span id="seconds">00</span>
        <small>SECONDS</small>
      </div>
    </div>

    <p>Launching 1 November 2026</p>

    <form>
      <input type="email" placeholder="Enter your email" required />
      <button type="submit">Join the Waitlist</button>
    </form>

    <div class="socials">
      <span>Instagram</span>
      <span>Facebook</span>
      <span>TikTok</span>
    </div>
  </main>

  <footer>© 2026 CAST · Built in the UK</footer>

  <script>
    const launchDate = new Date("November 1, 2026 00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance <= 0) {
        document.querySelector(".countdown").innerHTML = "CAST is live.";
        return;
      }

      document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
      document.getElementById("hours").innerText = Math.floor((distance / (1000 * 60 * 60)) % 24);
      document.getElementById("minutes").innerText = Math.floor((distance / (1000 * 60)) % 60);
      document.getElementById("seconds").innerText = Math.floor((distance / 1000) % 60);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAST</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 8%, rgba(184, 135, 58, 0.2), transparent 26%),
        radial-gradient(circle at center, #171717 0%, #070707 48%, #000 100%);
      color: #f5f1e8;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.35;
      pointer-events: none;
    }

    .wrap {
      width: min(92%, 980px);
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .cast-logo {
      font-size: clamp(78px, 18vw, 210px);
      line-height: 0.9;
      letter-spacing: 0.09em;
      font-weight: 900;
      color: #050505;
      text-shadow:
        2px 2px 3px rgba(255,255,255,0.08),
        -3px -3px 8px rgba(0,0,0,0.95),
        0 0 45px rgba(195, 139, 57, 0.14);
      margin-bottom: 38px;
      user-select: none;
    }

    .tagline {
      color: #b88b4a;
      text-transform: uppercase;
      letter-spacing: 0.34em;
      font-size: clamp(11px, 1.6vw, 14px);
      margin-bottom: 40px;
    }

    .coming {
      font-size: clamp(18px, 3vw, 28px);
      letter-spacing: 0.08em;
      margin: 0 0 18px;
      color: #f2eadc;
      font-weight: 500;
    }

    .sub {
      color: #9b958b;
      font-size: 15px;
      margin-bottom: 32px;
    }

    form {
      width: min(100%, 540px);
      margin: 0 auto;
      display: flex;
      border: 1px solid rgba(184, 139, 74, 0.38);
      background: rgba(255,255,255,0.035);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 45px rgba(0,0,0,0.45);
    }

    input {
      flex: 1;
      padding: 18px 20px;
      background: transparent;
      border: 0;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    input::placeholder {
      color: #777;
    }

    button {
      border: 0;
      padding: 0 28px;
      background: linear-gradient(135deg, #d5aa61, #9f702e);
      color: #070707;
      font-weight: 800;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .foot {
      margin-top: 34px;
      color: #5f5a52;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    @media (max-width: 620px) {
      .tagline {
        letter-spacing: 0.18em;
        line-height: 1.8;
      }

      form {
        flex-direction: column;
      }

      button {
        padding: 17px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="cast-logo">CAST</div>

    <div class="tagline">Built by Anglers. Trusted by Everyone.</div>

    <h1 class="coming">Something Different Is Coming.</h1>

    <p class="sub">Join the Founding Members list.</p>

    <form>
      <input type="email" placeholder="Enter your email address" />
      <button type="submit">JOIN</button>
    </form>

    <div class="foot">Project Cast</div>
  </main>
</body>
</html>

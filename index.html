<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAST</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 5%, rgba(180,130,60,.22), transparent 28%),
    radial-gradient(circle at center, #151515 0%, #050505 55%, #000 100%);
  color: #f4f0e8;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.wrap {
  width: min(92%, 1000px);
  text-align: center;
  padding: 40px 20px;
}

.logo {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: clamp(12px, 2vw, 28px);
  margin-bottom: 38px;
  filter: drop-shadow(0 22px 18px rgba(0,0,0,.9));
}

.letter {
  font-size: clamp(90px, 18vw, 220px);
  font-weight: 900;
  line-height: .8;
  color: #030303;
  text-shadow:
    2px 2px 3px rgba(255,255,255,.08),
    -4px -4px 10px rgba(0,0,0,1),
    0 0 35px rgba(180,130,60,.10);
}

.a-mark {
  position: relative;
  width: clamp(82px, 14vw, 180px);
  height: clamp(82px, 14vw, 180px);
}

.a-mark:before,
.a-mark:after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 28%;
  height: 100%;
  background: #030303;
  box-shadow:
    2px 2px 3px rgba(255,255,255,.08),
    -4px -4px 10px rgba(0,0,0,1);
}

.a-mark:before {
  left: 18%;
  transform: skewX(-24deg);
}

.a-mark:after {
  right: 18%;
  transform: skewX(24deg);
}

.dot {
  position: absolute;
  width: 18%;
  height: 18%;
  border-radius: 50%;
  background: #030303;
  left: 50%;
  bottom: 3%;
  transform: translateX(-50%);
  box-shadow:
    2px 2px 3px rgba(255,255,255,.08),
    -4px -4px 10px rgba(0,0,0,1);
}

.tagline {
  color: #b88b4a;
  text-transform: uppercase;
  letter-spacing: .36em;
  font-size: clamp(11px, 1.5vw, 14px);
  margin-bottom: 70px;
}

h1 {
  font-size: clamp(20px, 3vw, 34px);
  letter-spacing: .18em;
  font-weight: 400;
  margin-bottom: 22px;
}

p {
  color: #d7d1c8;
  font-size: 17px;
  margin-bottom: 30px;
}

form {
  width: min(100%, 620px);
  margin: auto;
  display: flex;
  border: 1px solid rgba(184,139,74,.38);
  background: rgba(255,255,255,.025);
  border-radius: 4px;
  overflow: hidden;
}

input {
  flex: 1;
  padding: 20px;
  background: transparent;
  border: 0;
  color: white;
  font-size: 16px;
  outline: none;
}

button {
  border: 0;
  padding: 0 34px;
  background: linear-gradient(135deg, #d8ad65, #a37432);
  color: #070707;
  font-weight: 800;
  letter-spacing: .08em;
}

.foot {
  margin-top: 38px;
  color: #b88b4a;
  letter-spacing: .28em;
  font-size: 12px;
  text-transform: uppercase;
}

@media (max-width: 650px) {
  .logo { gap: 8px; }
  .tagline { letter-spacing: .18em; line-height: 1.8; }
  form { flex-direction: column; }
  button { padding: 18px; }
}
</style>
</head>

<body>
  <main class="wrap">
    <div class="logo">
      <span class="letter">C</span>
      <span class="a-mark"><span class="dot"></span></span>
      <span class="letter">S</span>
      <span class="letter">T</span>
    </div>

    <div class="tagline">Built by Anglers. Trusted by Everyone.</div>

    <h1>Something Different Is Coming.</h1>

    <p>Join the Founding Members list.</p>

    <form>
      <input type="email" placeholder="Enter your email address" />
      <button type="submit">JOIN THE LIST</button>
    </form>

    <div class="foot">Project Cast</div>
  </main>
</body>
</html>

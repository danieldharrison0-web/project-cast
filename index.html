<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAST</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #f4f0e8;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(184, 135, 58, 0.22), transparent 30%),
        radial-gradient(circle at center, #161616 0%, #070707 55%, #000 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.22;
      pointer-events: none;
    }

    .page {
      width: min(92vw, 1050px);
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: min(900px, 90vw);
      display: block;
      margin: 0 auto 46px;
      filter: drop-shadow(0 30px 28px rgba(0,0,0,0.9));
    }

    .divider {
      width: 240px;
      height: 1px;
      margin: 0 auto 42px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(184, 135, 58, 0.75),
        transparent
      );
      position: relative;
    }

    .divider::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #b88b4a;
      box-shadow: 0 0 20px rgba(184, 135, 58, 0.9);
    }

    .headline {
      font-size: clamp(20px, 3vw, 34px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 400;
      margin: 0 0 22px;
      color: #f2eee8;
    }

    .sub {
      color: #d0cac0;
      font-size: clamp(16px, 2vw, 20px);
      margin: 0 0 32px;
    }

    form {
      width: min(100%, 640px);
      margin: 0 auto;
      display: flex;
      border: 1px solid rgba(184, 139, 74, 0.42);
      border-radius: 4px;
      overflow: hidden;
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }

    input {
      flex: 1;
      padding: 20px 22px;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
    }

    input::placeholder {
      color: #777;
    }

    button {
      border: none;
      padding: 0 34px;
      background: linear-gradient(135deg, #d8ad65, #9f702e);
      color: #070707;
      font-weight: 800;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .footer {
      margin-top: 40px;
      color: #b88b4a;
      letter-spacing: 0.35em;
      font-size: 12px;
      text-transform: uppercase;
    }

    @media (max-width: 650px) {
      .logo {
        width: 96vw;
        margin-bottom: 34px;
      }

      .headline {
        letter-spacing: 0.12em;
        line-height: 1.5;
      }

      form {
        flex-direction: column;
      }

      button {
        padding: 18px;
      }

      .footer {
        letter-spacing: 0.22em;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <img src="IMG_0316.png" alt="CAST" class="logo" />

    <div class="divider"></div>

    <h1 class="headline">Something Different Is Coming.</h1>

    <p class="sub">Join the Founding Members list.</p>

    <form>
      <input type="email" placeholder="Enter your email address" />
      <button type="submit">JOIN THE LIST</button>
    </form>

    <div class="footer">Built by Anglers. Trusted by Everyone.</div>
  </main>
</body>
</html>
